name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/schud.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o artifacts

      - name: Prepare portable exe
        shell: pwsh
        run: |
          Copy-Item "artifacts\schud.exe" "SCBridgeHUD-${{ steps.version.outputs.VERSION }}-portable.exe"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Install WiX UI extension
        run: wix extension add WixToolset.UI.wixext

      - name: Build MSI installer
        shell: pwsh
        run: |
          wix build installer\installer.wxs `
            -ext WixToolset.UI.wixext `
            -o "SCBridgeHUD-${{ steps.version.outputs.VERSION }}-setup.msi" `
            -arch x64 `
            -define ProductVersion=${{ steps.version.outputs.VERSION }} `
            -define PublishDir=artifacts

      # Upload unsigned artifacts for SignPath (or direct release if signing not configured)
      - name: Upload unsigned artifacts
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries
          path: |
            SCBridgeHUD-${{ steps.version.outputs.VERSION }}-portable.exe
            SCBridgeHUD-${{ steps.version.outputs.VERSION }}-setup.msi

      # SignPath code signing (skipped until SIGNPATH_ORGANIZATION_ID is configured)
      - name: Sign artifacts with SignPath
        id: sign
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ vars.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "sc-hud"
          signing-policy-slug: "release-signing"
          github-artifact-id: "${{ steps.upload-unsigned.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed"

      # Use signed artifacts if available, otherwise use unsigned
      - name: Prepare release artifacts
        shell: pwsh
        run: |
          if (Test-Path "signed") {
            Write-Host "Using signed artifacts"
            Copy-Item "signed\*" "release\" -Force
          } else {
            Write-Host "Using unsigned artifacts (signing not configured)"
            New-Item -ItemType Directory -Path "release" -Force | Out-Null
            Copy-Item "SCBridgeHUD-${{ steps.version.outputs.VERSION }}-portable.exe" "release\"
            Copy-Item "SCBridgeHUD-${{ steps.version.outputs.VERSION }}-setup.msi" "release\"
          }

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SCBridgeHUD-${{ steps.version.outputs.VERSION }}-portable.exe
            release/SCBridgeHUD-${{ steps.version.outputs.VERSION }}-setup.msi
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
