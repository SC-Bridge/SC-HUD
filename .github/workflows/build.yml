name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/schud.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o artifacts

      - name: Prepare portable exe
        shell: pwsh
        run: |
          Copy-Item "artifacts\schud.exe" "SCBridgeHUD-portable.exe"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version "4.*"

      - name: Build MSI installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer\stage" -Force | Out-Null
          Copy-Item "artifacts\*" "installer\stage\" -Recurse -Force
          Copy-Item "src\Assets\icon.ico" "installer\"

          # Generate AppFiles.wxs — explicit Component/File per staged file (WiX 4.x compatible)
          # Exclude the runtimes\ subdirectory — root WebView2Loader.dll is identical and sufficient
          $stageDir = Resolve-Path "installer\stage"
          $files = Get-ChildItem -Path $stageDir -File
          $sb = [System.Text.StringBuilder]::new()
          [void]$sb.AppendLine('<?xml version="1.0" encoding="UTF-8"?>')
          [void]$sb.AppendLine('<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">')
          [void]$sb.AppendLine('  <Fragment>')
          [void]$sb.AppendLine('    <ComponentGroup Id="AppFiles" Directory="INSTALLFOLDER">')
          foreach ($f in $files) {
            $rel = $f.FullName.Substring($stageDir.Path.Length + 1)
            $id  = 'comp_' + ($rel -replace '[^a-zA-Z0-9]', '_')
            [void]$sb.AppendLine("      <Component Id=""$id"" Guid=""*"">")
            [void]$sb.AppendLine("        <File Id=""f_$id"" Source=""stage\$rel"" />")
            [void]$sb.AppendLine("      </Component>")
          }
          [void]$sb.AppendLine('    </ComponentGroup>')
          [void]$sb.AppendLine('  </Fragment>')
          [void]$sb.AppendLine('</Wix>')
          $sb.ToString() | Out-File "installer\AppFiles.wxs" -Encoding UTF8

          Write-Host "=== AppFiles.wxs ==="
          Get-Content "installer\AppFiles.wxs"

          cd installer
          wix extension add WixToolset.UI.wixext/4.0.5
          wix build installer.wxs AppFiles.wxs `
            -ext WixToolset.UI.wixext `
            -o "..\SCBridgeHUD-setup.msi" `
            -arch x64 `
            -define ProductVersion=${{ steps.version.outputs.VERSION }}

      # Upload unsigned artifacts for SignPath (or direct release if signing not configured)
      - name: Upload unsigned artifacts
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries
          path: |
            SCBridgeHUD-portable.exe
            SCBridgeHUD-setup.msi

      # SignPath code signing (skipped until SIGNPATH_ORGANIZATION_ID is configured)
      - name: Sign artifacts with SignPath
        id: sign
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ vars.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "sc-hud"
          signing-policy-slug: "release-signing"
          github-artifact-id: "${{ steps.upload-unsigned.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed"

      # Use signed artifacts if available, otherwise use unsigned
      - name: Prepare release artifacts
        shell: pwsh
        run: |
          if (Test-Path "signed") {
            Write-Host "Using signed artifacts"
            Copy-Item "signed\*" "release\" -Force
          } else {
            Write-Host "Using unsigned artifacts (signing not configured)"
            New-Item -ItemType Directory -Path "release" -Force | Out-Null
            Copy-Item "SCBridgeHUD-portable.exe" "release\"
            Copy-Item "SCBridgeHUD-setup.msi" "release\"
          }

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SCBridgeHUD-portable.exe
            release/SCBridgeHUD-setup.msi
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
